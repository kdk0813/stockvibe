<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVibe - 주식 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #eeeeee;
            --accent-color: #1a73e8;
            --input-bg: #ffffff;
            --metric-bg: #f8f9fa;
            --summary-bg: #fffdf5;
            --summary-border: #fef0c7;
        }

        [data-theme='dark'] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #bbbbbb;
            --border-color: #333333;
            --accent-color: #8ab4f8;
            --input-bg: #2d2d2d;
            --metric-bg: #2d2d2d;
            --summary-bg: #2d2a20;
            --summary-border: #444030;
        }

        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 40px; transition: background-color 0.3s, color 0.3s; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 520px; margin-bottom: 20px; transition: background-color 0.3s; border: 1px solid var(--border-color); }
        
        h1 { color: var(--accent-color); margin-top: 0; font-size: 24px; text-align: center; }
        .header { display: flex; justify-content: center; align-items: center; position: relative; width: 100%; margin-bottom: 20px; }
        .theme-toggle { position: absolute; right: 0; padding: 8px 12px; font-size: 0.8em; border-radius: 20px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); cursor: pointer; }

        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; background: var(--input-bg); color: var(--text-main); transition: border 0.2s; }
        input:focus { border-color: var(--accent-color); }
        button { padding: 12px 20px; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        
        #searchResults { display: none; margin-top: 15px; border: 1px solid var(--border-color); border-radius: 8px; max-height: 200px; overflow-y: auto; background: var(--input-bg); }
        .search-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--border-color); font-size: 0.9em; }
        .search-symbol { font-weight: bold; color: var(--accent-color); }
        .search-name { font-size: 0.85em; color: var(--text-sub); }

        .watchlist-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .watchlist-item:hover { background-color: rgba(0,0,0,0.02); }
        [data-theme='dark'] .watchlist-item:hover { background-color: rgba(255,255,255,0.05); }
        
        .symbol-name { font-weight: 700; font-size: 1.1em; color: var(--text-main); }
        .price { font-size: 1.1em; font-weight: bold; color: var(--text-main); }
        .up { color: #ff5252; }
        .down { color: #448aff; }
        
        .action-btn { padding: 4px 8px; font-size: 0.8em; border-radius: 4px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-sub); }
        .delete-btn:hover { background-color: #ff5252; color: white; border-color: #ff5252; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .metric-box { background: var(--metric-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        .metric-label { font-size: 0.75em; color: var(--text-sub); margin-bottom: 4px; }
        .metric-value { font-weight: bold; font-size: 1em; color: var(--text-main); }

        .summary-box { background: var(--summary-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--summary-border); font-size: 0.9em; line-height: 1.6; color: var(--text-main); margin-bottom: 25px; }
        
        .news-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed var(--border-color); }
        .news-title { font-weight: bold; display: block; color: var(--text-main); text-decoration: none; margin-bottom: 4px; }
        .news-title:hover { color: var(--accent-color); }
        .news-meta { font-size: 0.8em; color: var(--text-sub); }
        #status { font-size: 0.8em; color: var(--text-sub); margin-top: 10px; }

        .period-selector { display: flex; gap: 5px; }
        .period-btn { padding: 4px 10px; font-size: 0.75em; border-radius: 4px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-sub); cursor: pointer; }
        .period-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .period-btn:hover:not(.active) { background: var(--border-color); }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>📈 StockVibe</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 다크 모드</button>
        </div>
        <div class="input-group">
            <input type="text" id="symbolInput" placeholder="종목명 또는 코드 (예: 삼성전자, AAPL)" onkeypress="if(event.keyCode==13) searchStock()">
            <button onclick="searchStock()">검색</button>
        </div>
        <div id="searchResults"></div>
        <div id="status">서버 연결 확인 중...</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0">⭐ 내 관심 종목</h3>
        <div id="watchlist">로딩 중...</div>
        
        <div id="detailSection" style="display:none; margin-top: 20px;">
            <h4 id="detailTitle" style="text-align: center; margin-bottom: 5px; color: var(--accent-color);"></h4>
            <div id="companyName" style="text-align: center; color: var(--text-sub); font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;"></div>
            <div class="metrics-grid" id="metricsGrid"></div>
            <div style="margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h5 style="margin: 0;">📊 주가 추세</h5>
                    <div class="period-selector" id="periodSelector">
                        <button class="period-btn active" onclick="changePeriod('1d')">1일</button>
                        <button class="period-btn" onclick="changePeriod('5d')">5일</button>
                        <button class="period-btn" onclick="changePeriod('1mo')">1개월</button>
                        <button class="period-btn" onclick="changePeriod('6mo')">6개월</button>
                        <button class="period-btn" onclick="changePeriod('1y')">1년</button>
                    </div>
                </div>
                <canvas id="stockChart"></canvas>
            </div>
            <div><h5 style="margin-bottom: 10px;">📖 기업 개요</h5><div id="companySummary" class="summary-box"></div></div>
            <div><h5 style="margin-bottom: 10px;">📰 최신 뉴스</h5><div id="newsList"></div></div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        let stockChart = null;
        let currentSymbol = "";

        // --- 테마 관리 ---
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            setTheme(target);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
            if (stockChart) updateChartColors(theme);
        }

        function updateChartColors(theme) {
            const textColor = theme === 'dark' ? '#bbbbbb' : '#666666';
            const gridColor = theme === 'dark' ? '#333333' : '#eeeeee';
            if (stockChart) {
                stockChart.options.scales.x.ticks.color = textColor;
                stockChart.options.scales.y.ticks.color = textColor;
                stockChart.options.scales.x.grid.color = gridColor;
                stockChart.options.scales.y.grid.color = gridColor;
                stockChart.update();
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        // --- 데이터 요청 유틸리티 ---
        async function apiFetch(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                if (!response.ok) throw new Error('API Error');
                return await response.json();
            } catch (e) {
                console.error(`Fetch error (${endpoint}):`, e);
                return null;
            }
        }

        // --- 검색 기능 ---
        async function searchStock() {
            const query = document.getElementById('symbolInput').value.trim();
            if (!query) return;
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = "<div style='padding:10px; font-size:0.9em;'>검색 중...</div>";
            resultsDiv.style.display = 'block';

            const data = await apiFetch(`/search/${encodeURIComponent(query)}`);
            if (!data || data.length === 0) {
                resultsDiv.innerHTML = `<div style='padding:10px;'>결과가 없습니다. (서버 연결 확인 필요)</div>`;
                return;
            }

            resultsDiv.innerHTML = "";
            data.forEach(item => {
                resultsDiv.innerHTML += `<div class="search-item">
                    <div class="search-info"><span class="search-symbol">${item.symbol}</span><span class="search-name">${item.name}</span></div>
                    <button style="padding:4px 10px; font-size:0.8em; background:#34a853;" onclick="addFromSearch('${item.symbol}')">추가</button>
                </div>`;
            });
        }

        async function addFromSearch(symbol) {
            const res = await apiFetch(`/watchlist/${symbol}`, { method: 'POST' });
            if (res) {
                document.getElementById('symbolInput').value = "";
                document.getElementById('searchResults').style.display = 'none';
                loadWatchlist();
            } else {
                alert("추가에 실패했습니다. 서버가 실행 중인지 확인하세요.");
            }
        }

        async function loadWatchlist() {
            const listDiv = document.getElementById('watchlist');
            const statusDiv = document.getElementById('status');
            const data = await apiFetch(`/watchlist`);
            
            if (data === null) {
                listDiv.innerText = "서버에 연결할 수 없습니다. 백엔드를 다시 실행해 주세요.";
                statusDiv.innerText = "상태: 서버 연결 실패";
                return;
            }

            listDiv.innerHTML = data.length ? "" : "관심 종목이 없습니다. 검색하여 추가해 보세요.";
            data.forEach(item => {
                const isUp = item.change > 0;
                const colorClass = isUp ? 'up' : (item.change < 0 ? 'down' : '');
                const sign = isUp ? '+' : '';
                listDiv.innerHTML += `
                    <div class="watchlist-item" onclick="showDetail('${item.symbol}')">
                        <div class="symbol-info"><span class="symbol-name">${item.symbol}</span></div>
                        <div style="display:flex; align-items:center;">
                            <div style="text-align:right;">
                                <div class="price">${item.price.toLocaleString()}</div>
                                <div class="${colorClass}">${sign}${item.change.toLocaleString()} (${sign}${item.changesPercentage}%)</div>
                            </div>
                            <button class="action-btn delete-btn" style="margin-left:15px;" onclick="event.stopPropagation(); removeFromWatchlist('${item.symbol}')">삭제</button>
                        </div>
                    </div>`;
            });
            statusDiv.innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
        }

        async function showDetail(symbol) {
            currentSymbol = symbol;
            document.getElementById('detailSection').style.display = 'block';
            document.getElementById('detailTitle').innerText = symbol;
            
            // 버튼 초기화 (1일 활성화)
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            const firstBtn = document.querySelector('.period-btn');
            if (firstBtn) firstBtn.classList.add('active');

            await Promise.all([loadInfo(symbol), loadChart(symbol, '1d'), loadNews(symbol)]);
            document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth' });
        }

        async function changePeriod(period) {
            if (!currentSymbol) return;
            
            // 버튼 활성화 상태 변경
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            await loadChart(currentSymbol, period);
        }

        async function loadInfo(symbol) {
            const data = await apiFetch(`/stock/${symbol}/info`);
            if (!data) return;
            document.getElementById('companyName').innerText = data.longName;
            document.getElementById('companySummary').innerText = data.longBusinessSummary;
            const formatCap = (cap) => cap >= 1e12 ? (cap/1e12).toFixed(2)+'T' : cap >= 1e9 ? (cap/1e9).toFixed(2)+'B' : cap >= 1e6 ? (cap/1e6).toFixed(2)+'M' : cap.toLocaleString();
            document.getElementById('metricsGrid').innerHTML = `
                <div class="metric-box"><div class="metric-label">시가총액</div><div class="metric-value">${formatCap(data.marketCap)}</div></div>
                <div class="metric-box"><div class="metric-label">섹터/산업</div><div class="metric-value" style="font-size:0.85em">${data.sector}</div></div>
                <div class="metric-box"><div class="metric-label">PER / 배당</div><div class="metric-value">${data.trailingPE.toFixed(2)} / ${(data.dividendYield*100).toFixed(2)}%</div></div>
                <div class="metric-box"><div class="metric-label">52주 최고/최저</div><div class="metric-value">${data.fiftyTwoWeekHigh} / ${data.fiftyTwoWeekLow}</div></div>`;
        }

        async function loadChart(symbol, period = '1d') {
            const data = await apiFetch(`/stock/${symbol}/history?period=${period}`);
            if (!data) return;
            const ctx = document.getElementById('stockChart').getContext('2d');
            const theme = document.documentElement.getAttribute('data-theme');
            const textColor = theme === 'dark' ? '#bbbbbb' : '#666666';
            const gridColor = theme === 'dark' ? '#333333' : '#eeeeee';
            if (stockChart) stockChart.destroy();
            stockChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{ label: '종가', data: data.map(d => d.price), borderColor: '#1a73e8', backgroundColor: 'rgba(26, 115, 232, 0.1)', fill: true, tension: 0.3, pointRadius: period === '1d' ? 0 : 2 }]
                },
                options: { 
                    responsive: true, 
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: textColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { color: gridColor } },
                        y: { ticks: { color: textColor }, grid: { color: gridColor } }
                    }
                }
            });
        }

        async function loadNews(symbol) {
            const data = await apiFetch(`/stock/${symbol}/news`);
            const newsDiv = document.getElementById('newsList');
            newsDiv.innerHTML = (data && data.length) ? "" : "뉴스가 없습니다.";
            if (data) {
                data.forEach(item => {
                    newsDiv.innerHTML += `<div class="news-item">
                        <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                        <div class="news-meta">${item.publisher} • ${new Date(item.publishTime * 1000).toLocaleString()}</div>
                    </div>`;
                });
            }
        }

        async function removeFromWatchlist(symbol) {
            if (!confirm(`${symbol} 삭제?`)) return;
            await apiFetch(`/watchlist/${symbol}`, { method: 'DELETE' });
            if (document.getElementById('detailTitle').innerText.includes(symbol)) document.getElementById('detailSection').style.display = 'none';
            loadWatchlist();
        }

        loadWatchlist();
        setInterval(loadWatchlist, 60000);
    </script>
</body>
</html>
