<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVibe - 주식 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 40px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 520px; margin-bottom: 20px; }
        h1 { color: #1a73e8; margin-top: 0; font-size: 24px; text-align: center; }
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #1a73e8; }
        button { padding: 12px 20px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .watchlist-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f1f1f1; cursor: pointer; }
        .watchlist-item:hover { background-color: #fcfcfc; }
        .watchlist-item:last-child { border-bottom: none; }
        .symbol-info { display: flex; flex-direction: column; }
        .symbol-name { font-weight: 700; font-size: 1.1em; }
        .price-info { text-align: right; }
        .price { font-size: 1.1em; font-weight: bold; }
        .change { font-size: 0.9em; margin-top: 2px; }
        .up { color: #d60000; }
        .down { color: #0051c7; }
        .btn-group { display: flex; gap: 5px; }
        .action-btn { padding: 4px 8px; font-size: 0.8em; border-radius: 4px; font-weight: normal; border: 1px solid #ddd; background: white; color: #666; }
        .delete-btn { color: #ff4d4f; border-color: #ffefef; }
        .delete-btn:hover { background-color: #ff4d4f; color: white; }
        #status { font-size: 0.8em; color: #888; margin-top: 10px; }
        
        /* 상세 섹션 스타일 */
        #detailSection { display: none; margin-top: 20px; }
        .detail-title { text-align: center; margin-bottom: 5px; color: #1a73e8; }
        .company-name { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        /* 메트릭 그리드 */
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .metric-box { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #f1f1f1; }
        .metric-label { font-size: 0.75em; color: #888; margin-bottom: 4px; }
        .metric-value { font-weight: bold; font-size: 1em; color: #333; }

        .summary-box { background: #fffdf5; padding: 15px; border-radius: 8px; border: 1px solid #fef0c7; font-size: 0.9em; line-height: 1.6; color: #555; margin-bottom: 25px; }
        
        .news-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .news-item:last-child { border-bottom: none; }
        .news-title { font-weight: bold; display: block; color: #333; text-decoration: none; margin-bottom: 4px; }
        .news-title:hover { color: #1a73e8; }
        .news-meta { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📈 StockVibe</h1>
        <div class="input-group">
            <input type="text" id="symbol" placeholder="종목 코드 (예: TSLA, AAPL, 005930.KS)">
            <button onclick="searchAndAdd()">추가</button>
        </div>
        <div id="status">최근 업데이트: -</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0">⭐ 내 관심 종목</h3>
        <div id="watchlist">로딩 중...</div>
        
        <div id="detailSection">
            <h4 id="detailTitle" class="detail-title"></h4>
            <div id="companyName" class="company-name"></div>
            
            <div class="metrics-grid" id="metricsGrid">
                <!-- 지표들이 여기에 들어감 -->
            </div>

            <div style="margin-bottom: 30px;">
                <h5 style="margin-bottom: 10px;">📊 주가 추세 (7일)</h5>
                <canvas id="stockChart"></canvas>
            </div>

            <div>
                <h5 style="margin-bottom: 10px;">📖 기업 개요</h5>
                <div id="companySummary" class="summary-box">로딩 중...</div>
            </div>

            <div>
                <h5 style="margin-bottom: 10px;">📰 최신 뉴스</h5>
                <div id="newsList">로딩 중...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        let stockChart = null;

        async function loadWatchlist() {
            const listDiv = document.getElementById('watchlist');
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch(`${API_BASE}/watchlist`);
                const data = await response.json();
                listDiv.innerHTML = data.length ? "" : "리스트가 비어있습니다.";
                
                data.forEach(item => {
                    const isUp = item.change > 0;
                    const isDown = item.change < 0;
                    const colorClass = isUp ? 'up' : (isDown ? 'down' : '');
                    const sign = isUp ? '+' : '';

                    listDiv.innerHTML += `
                        <div class="watchlist-item" onclick="showDetail('${item.symbol}')">
                            <div class="symbol-info">
                                <span class="symbol-name">${item.symbol}</span>
                            </div>
                            <div style="display: flex; align-items: center;">
                                <div class="price-info">
                                    <div class="price">$${item.price.toLocaleString()}</div>
                                    <div class="change ${colorClass}">
                                        ${sign}${item.change.toLocaleString()} (${sign}${item.changesPercentage}%)
                                    </div>
                                </div>
                                <div class="btn-group" style="margin-left: 15px;">
                                    <button class="action-btn delete-btn" onclick="event.stopPropagation(); removeFromWatchlist('${item.symbol}')">삭제</button>
                                </div>
                            </div>
                        </div>`;
                });
                statusDiv.innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            } catch (e) { 
                listDiv.innerText = "서버에 연결할 수 없습니다."; 
            }
        }

        async function showDetail(symbol) {
            document.getElementById('detailSection').style.display = 'block';
            document.getElementById('detailTitle').innerText = symbol;
            
            // 모든 정보 병렬 로드
            await Promise.all([
                loadInfo(symbol),
                loadChart(symbol),
                loadNews(symbol)
            ]);
            
            document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth' });
        }

        async function loadInfo(symbol) {
            const grid = document.getElementById('metricsGrid');
            const summary = document.getElementById('companySummary');
            const compName = document.getElementById('companyName');
            
            try {
                const response = await fetch(`${API_BASE}/stock/${symbol}/info`);
                const data = await response.json();
                
                compName.innerText = data.longName;
                summary.innerText = data.longBusinessSummary;
                
                const formatCap = (cap) => {
                    if (cap >= 1e12) return (cap / 1e12).toFixed(2) + 'T';
                    if (cap >= 1e9) return (cap / 1e9).toFixed(2) + 'B';
                    if (cap >= 1e6) return (cap / 1e6).toFixed(2) + 'M';
                    return cap.toLocaleString();
                };

                grid.innerHTML = `
                    <div class="metric-box">
                        <div class="metric-label">시가총액</div>
                        <div class="metric-value">$${formatCap(data.marketCap)}</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">섹터/산업</div>
                        <div class="metric-value" style="font-size:0.85em">${data.sector} / ${data.industry}</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">PER / 배당수익률</div>
                        <div class="metric-value">${data.trailingPE.toFixed(2)} / ${(data.dividendYield * 100).toFixed(2)}%</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">52주 최고/최저</div>
                        <div class="metric-value">$${data.fiftyTwoWeekHigh} / $${data.fiftyTwoWeekLow}</div>
                    </div>
                `;
            } catch (e) { console.error("정보 로드 실패"); }
        }

        async function loadChart(symbol) {
            const ctx = document.getElementById('stockChart').getContext('2d');
            try {
                const response = await fetch(`${API_BASE}/stock/${symbol}/history`);
                const data = await response.json();
                const labels = data.map(d => d.date);
                const prices = data.map(d => d.price);

                if (stockChart) stockChart.destroy();

                stockChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '종가',
                            data: prices,
                            borderColor: '#1a73e8',
                            backgroundColor: 'rgba(26, 115, 232, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } }
                    }
                });
            } catch (e) { console.error("차트 로드 실패"); }
        }

        async function loadNews(symbol) {
            const newsDiv = document.getElementById('newsList');
            newsDiv.innerHTML = "뉴스를 불러오는 중...";
            try {
                const response = await fetch(`${API_BASE}/stock/${symbol}/news`);
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    newsDiv.innerHTML = "관련 뉴스가 없습니다.";
                    return;
                }

                newsDiv.innerHTML = "";
                data.forEach(item => {
                    const date = new Date(item.publishTime * 1000).toLocaleString();
                    newsDiv.innerHTML += `
                        <div class="news-item">
                            <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                            <div class="news-meta">${item.publisher} • ${date}</div>
                        </div>`;
                });
            } catch (e) { 
                newsDiv.innerText = "뉴스 로드 실패"; 
            }
        }

        async function searchAndAdd() {
            const input = document.getElementById('symbol');
            const symbol = input.value.toUpperCase().trim();
            if (!symbol) return;
            try {
                const response = await fetch(`${API_BASE}/watchlist/${symbol}`, { method: 'POST' });
                if (response.ok) {
                    input.value = "";
                    loadWatchlist();
                } else {
                    alert("추가 실패. 종목 코드를 확인하세요.");
                }
            } catch (e) { alert("서버 연결 실패"); }
        }

        async function removeFromWatchlist(symbol) {
            if (!confirm(`${symbol} 삭제하시겠습니까?`)) return;
            try {
                await fetch(`${API_BASE}/watchlist/${symbol}`, { method: 'DELETE' });
                if (document.getElementById('detailTitle').innerText.includes(symbol)) {
                    document.getElementById('detailSection').style.display = 'none';
                }
                loadWatchlist();
            } catch (e) { alert("삭제 실패"); }
        }

        loadWatchlist();
        setInterval(loadWatchlist, 60000);
    </script>
</body>
</html>
